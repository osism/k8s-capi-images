---
compute_engine_instance:
  image_project: cirrus-images
  image: family/docker-kvm
  platform: linux
  cpu: 4
  memory: 16G
  disk: 100
  nested_virtualization: true

# environment variables

env:
  DEBIAN_FRONTEND: noninteractive
  HOME: "$CIRRUS_WORKING_DIR"
  PACKER_TMP_DIR: "$CIRRUS_WORKING_DIR/.packer.d"
  S3_ACCESS_KEY: "ENCRYPTED[77f033c741c72cde32b377c0bef41897e741b4bbf1a6a4d1e9ce51ab5c7b1a49086d9e88fa072c4e82dac483ca484667]"
  S3_SECRET_KEY: "ENCRYPTED[f4ebc46ccbdf36946f38c6c881ef69ee689af6a62318116857d46e2c37cedc8a8845e9d6f15390a37774d8f240f0a5f5]"

build_task_template: &BUILD_TASK_TEMPLATE
  timeout_in: 120m
  install_script: |
    while fuser /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 5; done;
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done;
    apt-get update
    while fuser /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 5; done;
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done;
    apt-get install -y git make python3-pip curl jq unzip libguestfs-tools

  prepare_script: |
    git clone https://github.com/kubernetes-sigs/image-builder
    cd image-builder/images/capi
    export PATH=$PWD/.bin:$HOME/.local/bin:$PATH
    make deps-qemu

  build_script: |
    cd image-builder/images/capi
    export PATH=$PWD/.bin:$HOME/.local/bin:$PATH
    make build-qemu-ubuntu-$DISTRO_VERSION

  prepare_push_script: |
    pushd image-builder/images/capi/output/ubuntu-$DISTRO_VERSION-kube-v$IMAGE_IDENTIFIER
    find . -type f -execdir bash -c 'x={}; cp $x ${x%.*}.qcow2; mv $x $x.qcow2' \;
    VARS_FILE_SUFFIX=${IMAGE_IDENTIFIER//.}
    VARS_FILE_SUFFIX=${VARS_FILE_SUFFIX//-/_}
    KUBERNETES_SEMVER=$(jq -r '.kubernetes_semver' $CIRRUS_WORKING_DIR/extra_vars_${VARS_FILE_SUFFIX}.json)
    echo "$(date +%Y-%m-%d) ubuntu-$DISTRO_VERSION-kube-v$IMAGE_IDENTIFIER/ubuntu-$DISTRO_VERSION-kube-$KUBERNETES_SEMVER.qcow2" > "last-$IMAGE_IDENTIFIER"
    ls -lah
    popd
    mv image-builder/images/capi/output/ubuntu-$DISTRO_VERSION-kube-v$IMAGE_IDENTIFIER/last-$IMAGE_IDENTIFIER .
    cat last-$IMAGE_IDENTIFIER

  sparsify_script: |
    pushd image-builder/images/capi/output/ubuntu-$DISTRO_VERSION-kube-v$IMAGE_IDENTIFIER
    find . -name '*.qcow2' -execdir bash -c 'x={}; virt-sparsify --in-place $x' \;
    find . -name '*.qcow2' -execdir bash -c 'x={}; sha256sum $(basename $x) > $x.CHECKSUM' \;
    ls -lah
    popd

  push_script: |
    if [[ "$CIRRUS_BRANCH" == "main" ]]; then
      curl -sSfL https://rclone.org/install.sh | bash
      export RCLONE_CONFIG_S3_TYPE=s3
      export RCLONE_CONFIG_S3_PROVIDER=Ceph
      export RCLONE_CONFIG_S3_ENDPOINT=https://nbg1.your-objectstorage.com
      export RCLONE_CONFIG_S3_REGION=nbg1
      export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$S3_ACCESS_KEY
      export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$S3_SECRET_KEY
      export RCLONE_CONFIG_S3_ACL=public-read
      export RCLONE_CONFIG_S3_NO_CHECK_BUCKET=true
      rclone copyto last-$IMAGE_IDENTIFIER s3:osism/openstack-k8s-capi-images/last-$IMAGE_IDENTIFIER
      rclone copy image-builder/images/capi/output/ s3:osism/openstack-k8s-capi-images/
    fi

build_133_task:
  <<: *BUILD_TASK_TEMPLATE
  skip: "!changesInclude('extra_vars_133.json', '.cirrus.yml')"
  env:
    IMAGE_IDENTIFIER: "1.33"
    DISTRO_VERSION: "2404"
    PACKER_VAR_FILES: ../../../extra_vars_133.json

build_133_gardener_task:
