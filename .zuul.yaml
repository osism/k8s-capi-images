---
# NOTE: the object-storage publish pipeline below is intentionally commented out
# for now and will be armed later. It comprises the SECRET_K8S_CAPI_IMAGES
# secret, the publish jobs, the project "post" pipeline (all below), and the two
# upload tasks in playbooks/build.yml. To arm it: regenerate the secret with real
# credentials (see the note below), then uncomment the secret block, the publish
# jobs and the project "post" section here.
#
# IMPORTANT: the upload tasks currently live at the tail of playbooks/build.yml,
# which runs BEFORE playbooks/validate.yml in the "run" list below. To let goss
# validation gate publishing (never upload an invalid image), relocate the upload
# tasks out of build.yml into a new playbooks/publish.yml appended AFTER
# playbooks/validate.yml in the abstract job's "run" list when arming. A failed
# validation then fails the job before any upload runs.
# The ACCESS_KEY/SECRET_KEY values below are placeholders that base64-decode to
# "REPLACE_WITH_ZUUL_ENCRYPTED_..." and only exist to keep this Zuul config
# valid. A maintainer holding the object-storage credentials MUST regenerate
# them for this project before the publish jobs can upload, for example:
#   echo -n "<ACCESS_KEY>" | zuul-client encrypt --tenant <tenant> \
#     --project osism/k8s-capi-images --secret-name SECRET_K8S_CAPI_IMAGES \
#     --field ACCESS_KEY
# and likewise for SECRET_KEY, pasting the !encrypted/pkcs1-oaep output here.
# - secret:
#     name: SECRET_K8S_CAPI_IMAGES
#     data:
#       ACCESS_KEY: !encrypted/pkcs1-oaep
#         - UkVQTEFDRV9XSVRIX1pVVUxfRU5DUllQVEVEX0FDQ0VTU19LRVk=
#       SECRET_KEY: !encrypted/pkcs1-oaep
#         - UkVQTEFDRV9XSVRIX1pVVUxfRU5DUllQVEVEX1NFQ1JFVF9LRVk=

- job:
    name: abstract-k8s-capi-images-build
    abstract: true
    parent: base
    nodeset: ubuntu-noble-large
    pre-run: playbooks/pre.yml
    run:
      - playbooks/build.yml
      - playbooks/validate.yml
    timeout: 7200
    vars:
      upload_image: false

# - job:
#     name: abstract-k8s-capi-images-publish
#     abstract: true
#     parent: abstract-k8s-capi-images-build
#     vars:
#       upload_image: true

- job:
    name: k8s-capi-images-build-v1.33
    parent: abstract-k8s-capi-images-build
    vars:
      kubernetes_version: v1.33
      variant: ""
    files: &files_v1_33
      - ^overrides/v1\.33\.json$
      - ^elements/k8s-capi/.*
      - ^playbooks/.*
      - ^requirements\.txt$

- job:
    name: k8s-capi-images-build-v1.33-gardener
    parent: abstract-k8s-capi-images-build
    vars:
      kubernetes_version: v1.33
