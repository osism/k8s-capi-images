---
- name: Build and publish a CAPI image
  hosts: all

  tasks:
    - name: Resolve the override file for this build
      ansible.builtin.set_fact:
        suffix: "{{ ('-' + variant) if variant | default('') else '' }}"
        override_file: "overrides/{{ kubernetes_version | default('v1.33') }}{{ ('-' + variant) if variant | default('') else '' }}.json"

    - name: Derive the image name components from the override file
      ansible.builtin.set_fact:
        image_dir: "ubuntu-2404-kube-{{ override_data.kubernetes_series }}{{ suffix }}"
        image_basename: "ubuntu-2404-kube-{{ override_data.kubernetes_semver }}{{ suffix }}"
        last_file: "last-{{ override_data.kubernetes_series | regex_replace('^v', '') }}{{ suffix }}"
      vars:
        override_data: "{{ lookup('file', playbook_dir ~ '/../' ~ override_file) | from_json }}"

    - name: Validate the derived image name components
      ansible.builtin.assert:
        that:
          - image_dir is match('^[A-Za-z0-9._-]+$')
          - image_basename is match('^[A-Za-z0-9._-]+$')
          - last_file is match('^[A-Za-z0-9._-]+$')
        fail_msg: >-
          Refusing to build: image name components derived from the override file
          contain characters outside [A-Za-z0-9._-]
          (image_dir={{ image_dir }}, image_basename={{ image_basename }}, last_file={{ last_file }}).

    - name: Build the image with disk-image-create
      ansible.builtin.shell:
        executable: /bin/bash
        chdir: "{{ zuul.project.src_dir }}"
        cmd: |
          set -e
          set -x

          source /tmp/venv/bin/activate
          export ELEMENTS_PATH=./elements
          export DIB_RELEASE=noble

          export DIB_K8S_CAPI_OVERRIDE
          DIB_K8S_CAPI_OVERRIDE="$(readlink -f "${OVERRIDE_FILE}")"

          FILE="${IMAGE_BASENAME}.qcow2"

          mkdir -p output
          disk-image-create -a amd64 -t qcow2 \
              -o "output/${IMAGE_BASENAME}" \
              ubuntu vm growroot openssh-server k8s-capi

          cd output
          sha256sum "${FILE}" > "${FILE}.CHECKSUM"
          printf '%s %s/%s\n' "$(date +%F)" "${IMAGE_DIR}" "${FILE}" > "${LAST_FILE}"
      environment:
        OVERRIDE_FILE: "{{ override_file }}"
        IMAGE_DIR: "{{ image_dir }}"
        IMAGE_BASENAME: "{{ image_basename }}"
        LAST_FILE: "{{ last_file }}"
      changed_when: true

