---
- name: Prepare the build host
  hosts: all

  vars:
    python_venv_dir: /tmp/venv

  roles:
    - role: ensure-pip

  tasks:
    - name: Install host packages required by diskimage-builder
      become: true
      ansible.builtin.apt:
        name:
          - debootstrap
          - dosfstools
          - gdisk
          - kpartx
          - parted
          - qemu-utils
          - rclone
          - squashfs-tools
          - zip
        update_cache: true

    - name: Install Python requirements into a virtualenv
      ansible.builtin.pip:
        requirements: "{{ ansible_user_dir }}/{{ zuul.project.src_dir }}/requirements.txt"
        virtualenv: "{{ python_venv_dir }}"
        virtualenv_command: python3 -m venv

    - name: Create the zuul-output directories
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/zuul-output/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - artifacts
        - docs
        - logs
