---
- name: Build image
  # hosts: all
  hosts: localhost
  connection: local

  vars:
    repo_path: "{{ ansible_user_dir|default('~') }}/src/github.com"
    upload_image: false

  tasks:
    - name: Run upload script
      ansible.builtin.shell:
        executable: /bin/bash
        chdir: "{{ repo_path }}/kubernetes-sigs/image-builder/images/capi/output"
        cmd: |
          find . -type f -execdir bash -c 'x={}; cp $x ${x%.*}.qcow2; mv $x $x.qcow2' \;
          curl -sSfL https://rclone.org/install.sh | bash
          export RCLONE_CONFIG_S3_TYPE=s3
          export RCLONE_CONFIG_S3_PROVIDER=Ceph
          export RCLONE_CONFIG_S3_ENDPOINT=https://nbg1.your-objectstorage.com
          export RCLONE_CONFIG_S3_REGION=nbg1
          export RCLONE_CONFIG_S3_ACCESS_KEY_ID={{ secret.ACCESS_KEY | trim }}
          export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY={{ secret.SECRET_KEY | trim }}
          export RCLONE_CONFIG_S3_ACL=public-read
          export RCLONE_CONFIG_S3_NO_CHECK_BUCKET=true
          rclone copy image-builder/images/capi/output/ s3:openstack-k8s-capi-images/
      when: upload_image|bool
      no_log: true
