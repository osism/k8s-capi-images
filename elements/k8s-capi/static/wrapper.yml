# Wrapper play for the diskimage-builder chroot.
#
# It mirrors image-builder's images/capi/ansible/node.yml play header (the same
# hosts/become/vars/environment) and runs the same core roles in the same order
# -- node (which pulls in setup) -> providers -> containerd -> kubernetes ->
# sysprep -- so the roles are reused unchanged rather than reimplemented.
#
# The only difference from node.yml is the manual containerd start/stop bracket
# around the kubernetes role: the chroot has no running systemd, so containerd is
# launched by hand for the kubeadm offline image pre-pull and stopped afterwards.
# node.yml's optional, gated-off includes (custom roles, load_additional_components,
# ecr_credential_provider) are dropped because their variables are not loaded.
---
- name: Provision node
  hosts: all
  become: true
  vars:
    system: linux
    arch_uname: "{{ ansible_facts['architecture'] }}"
    arch: "{{ {'x86_64': 'amd64', 'amd64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64', 'ppc64le': 'ppc64le'}.get(arch_uname, 'unsupported') }}"

  tasks:
    - name: Include node role
      ansible.builtin.include_role:
        name: node
    - name: Include providers role
      ansible.builtin.include_role:
        name: providers
    - name: Include containerd role
      ansible.builtin.include_role:
        name: containerd

    - name: Pre-pull Kubernetes images with a build-time containerd
      block:
        # In the systemd-less DIB chroot /proc/self/mountinfo is the host's
        # mount table, so containerd's btrfs snapshotter cannot find the mount
        # info for its root dir and fails to load. That failure cascades through
        # the metadata plugin into the CRI plugins, so kubeadm's pre-pull aborts
        # with "unknown service runtime.v1.RuntimeService". Start the build-time
        # containerd from a chroot-only config that prepends disabled_plugins to
        # the shipped config.toml; the shipped /etc/containerd/config.toml is
        # left untouched so production images keep the upstream snapshotter set.
        - name: Start containerd in the background for the offline image pre-pull
          ansible.builtin.shell: |
            set -eu
            { echo 'disabled_plugins = ["io.containerd.snapshotter.v1.btrfs"]'
              cat /etc/containerd/config.toml
            } > /run/containerd-build.toml
            setsid /usr/local/bin/containerd --config /run/containerd-build.toml \
              </dev/null >/var/log/containerd-build.log 2>&1 &
          args:
            executable: /bin/bash
          changed_when: true
        - name: Wait for the containerd socket
          ansible.builtin.wait_for:
            path: /var/run/containerd/containerd.sock
            timeout: 60

        - name: Include kubernetes role
          ansible.builtin.include_role:
            name: kubernetes
      rescue:
        # The kubeadm pre-pull talks to the build-time containerd over its
        # socket; when it fails (for example because the CRI plugin did not
        # load) the cause is in containerd's own log and plugin list, which are
        # otherwise lost when the chroot is torn down. containerd is still
        # running here (the reap runs later in always), so query it before
        # re-failing. Use debug to print the captured output: a bare command
        # task's stdout is not surfaced in the build log.
        - name: Read the build-time containerd log
          ansible.builtin.command: cat /var/log/containerd-build.log
          register: containerd_build_log
          changed_when: false
          failed_when: false
        - name: Show the build-time containerd log
          ansible.builtin.debug:
            var: containerd_build_log.stdout_lines
        - name: List the build-time containerd plugins and their load status
          ansible.builtin.command:
            cmd: ctr --address /var/run/containerd/containerd.sock plugins ls
          register: containerd_plugins
          changed_when: false
          failed_when: false
        - name: Show the build-time containerd plugins
          ansible.builtin.debug:
            var: containerd_plugins.stdout_lines
        - name: Fail the build after surfacing containerd diagnostics
          ansible.builtin.fail:
            msg: >-
              Kubernetes image pre-pull failed; see the build-time containerd
              log and plugin list dumped above.
      always:
        - name: Reap the build-time containerd before teardown
          ansible.builtin.shell: |
            set -u
            # Stop containerd, then wait for it to actually exit so its overlay
            # snapshot mounts and content store are released before sysprep and
            # the DIB chroot unmount run. Escalate to SIGKILL if it outlives ~30s.
            # Match by exact process name (-x), never with -f: a -f pattern also
            # matches the reap script command line and would SIGTERM the shell
            # running it, because the script text itself contains the pattern.
            pkill -TERM -x containerd || true
            for _ in $(seq 30); do
                pgrep -x containerd >/dev/null 2>&1 || break
                sleep 1
            done
            if pgrep -x containerd >/dev/null 2>&1; then
                pkill -KILL -x containerd || true
                rm -f /var/run/containerd/containerd.sock
            fi
          args:
            executable: /bin/bash
          changed_when: true
        - name: Wait for the containerd socket to be released
          ansible.builtin.wait_for:
            path: /var/run/containerd/containerd.sock
            state: absent
            timeout: 30

    - name: Include sysprep role
      ansible.builtin.include_role:
        name: sysprep

  environment:
    http_proxy: "{{ http_proxy | default('') }}"
    https_proxy: "{{ https_proxy | default('') }}"
    no_proxy: "{{ no_proxy | default('') }}"
    HTTP_PROXY: "{{ http_proxy | default('') }}"
    HTTPS_PROXY: "{{ https_proxy | default('') }}"
    NO_PROXY: "{{ no_proxy | default('') }}"
    PYTHONPATH: "{{ python_path | default(omit) }}"
